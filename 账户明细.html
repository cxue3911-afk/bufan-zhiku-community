<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>账户明细 - 不凡智库社区</title>
  <style>
    :root{--bg:#f4f6f8;--panel:#fff;--line:#e5e9ef;--text:#20242a;--muted:#6d7480;--red:#df1d2d;--blue:#246bfe;--max:980px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-size:14px;line-height:1.55}a{text-decoration:none;color:inherit}.topbar{height:64px;background:#fff;border-bottom:1px solid var(--line)}.topbar-inner{width:min(var(--max),calc(100vw - 40px));height:64px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}.brand{font-weight:900;color:var(--red);font-size:20px}.btn{height:34px;border:1px solid var(--line);border-radius:6px;background:#fff;padding:0 12px;display:inline-flex;align-items:center}.btn.primary{background:var(--red);color:#fff;border-color:var(--red);font-weight:700}.wrap{width:min(var(--max),calc(100vw - 40px));margin:18px auto 48px;display:grid;gap:14px}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(23,31,42,.06)}.wallet{padding:22px;display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:18px;align-items:center}.amount{color:var(--red);font-size:34px;font-weight:900}.wallet p{margin:4px 0 0;color:var(--muted)}.pay-box{display:grid;gap:10px}.pay-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.pay{height:38px;border-radius:6px;border:1px solid #ffd7dc;background:#fff2f3;color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:800}.pay.main{background:var(--red);color:#fff}.section{padding:18px}.section h2{margin:0 0 12px;font-size:18px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:12px 8px;text-align:left}.table th{color:var(--muted);font-weight:700;background:#fafbfc}.income{color:#0f9f6e;font-weight:800}.out{color:var(--red);font-weight:800}@media(max-width:760px){.wallet{grid-template-columns:1fr}.pay-row{grid-template-columns:1fr}.topbar-inner{width:calc(100vw - 24px)}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><a class="brand" href="不凡智库工程师社区首页原型.html">不凡智库社区</a><div><a class="btn" href="我的主页.html">返回我的主页</a> <a class="btn primary" href="不凡智库工程师社区首页原型.html">返回首页</a></div></div></header>
  <main class="wrap">
    <section class="panel wallet">
      <div>
        <div>账户余额</div>
        <div class="amount">260 元</div>
        <p>余额可用于打赏、悬赏提问、付费解锁深度资料。充值入口统一放在账户明细页。</p>
      </div>
      <div class="pay-box">
        <a class="pay main" href="#">立即充值</a>
        <div class="pay-row">
          <a class="pay" href="#">支付宝充值</a>
          <a class="pay" href="#">微信充值</a>
          <a class="pay" href="#">充值记录</a>
        </div>
      </div>
    </section>
    <section class="panel section">
      <h2>账户流水</h2>
      <table class="table">
        <thead><tr><th>时间</th><th>类型</th><th>说明</th><th>金额</th><th>状态</th></tr></thead>
        <tbody>
          <tr><td>2026-07-03 09:20</td><td>充值</td><td>微信充值到账</td><td class="income">+100 元</td><td>已完成</td></tr>
          <tr><td>2026-07-02 16:30</td><td>悬赏冻结</td><td>发布“电源轻载啸叫”悬赏问题</td><td class="out">-50 元</td><td>冻结中</td></tr>
          <tr><td>2026-07-01 18:10</td><td>打赏</td><td>打赏“内阻复测流程”回答</td><td class="out">-20 元</td><td>已完成</td></tr>
          <tr><td>2026-06-30 11:42</td><td>奖励</td><td>每周加精帖奖励</td><td class="income">+50 元</td><td>已完成</td></tr>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
